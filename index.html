<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Execution Dashboard</title>
    <meta name="description" content="Track execution, outputs, and momentum. Measure what matters." />
    <meta name="theme-color" content="#060606" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dashboard" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.25s ease-out; }
      .scrollbar-none { scrollbar-width: none; -ms-overflow-style: none; }
      .scrollbar-none::-webkit-scrollbar { display: none; }
      @media (max-width: 640px) {
        .table-mobile-scroll { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-mobile-scroll table { min-width: 500px; }
        .touch-target { min-height: 44px; min-width: 44px; }
      }
      * { -webkit-tap-highlight-color: transparent; }
      input, textarea, select { font-size: 16px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
