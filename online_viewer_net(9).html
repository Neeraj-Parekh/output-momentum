// Rich definitions shown inside the modal dialog for continual-learning terms
const DEFINITIONS = {
    'LoRA': `
        <strong>LoRA (Low-Rank Adapters)</strong>: a parameter-efficient fine-tuning method that injects low-rank adapter matrices B and A into pretrained weight updates so W' = W + BA. Only adapter parameters are trained (rank r ≪ full weight), keeping most pre-trained weights frozen. Example: adapt a ResNet classifier to a new class set by training LoRA adapters of rank r=8 instead of full-finetuning.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Key refs: Hu et al., 2021 — LoRA (arXiv:2106.09685). Practical tip: use α/r scaling and initialize B with small variance.</div>
    `,
    'PEFT': `
        <strong>PEFT (Parameter-Efficient Fine-Tuning)</strong>: umbrella term for methods (LoRA, adapters, IA3, prompt tuning) that add or reparameterize a small set of parameters for new tasks instead of updating the full model. PEFT reduces memory, speeds up checkpointing, and simplifies multi-task deployment.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Example: in few-shot classification, PEFT adapters allow switching task adapters at runtime without storing full model copies. See: Lester et al., 2021 (Prompt Tuning); Hu et al., 2021 (LoRA).</div>
    `,
    'FLOP': `
        <strong>FLOP (Floating-point Operation)</strong>: a single floating-point operation (add/multiply). Used to quantify compute cost (GFLOPs, TFLOPs). When measuring inference cost, count multiply-accumulate operations per token/image and include gating overhead for MoE.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Practical: MoE with top-k routing reduces effective FLOPs per sample compared to dense ensembles.</div>
    `,
    'EWC': `
        <strong>EWC (Elastic Weight Consolidation)</strong>: regularization that penalizes changes to parameters deemed important for previous tasks using a Fisher information estimate. Loss term: λ/2 Σ F_i (θ_i − θ*_i)^2. Works best when task boundaries are known or when Fisher is updated online with EMA.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Key refs: Kirkpatrick et al., 2017 (EWC). Practical tip: compute diagonal Fisher on a small held-out set and mask out low-importance parameters to allow plastic adaptation.</div>
    `,
    'MoE': `
        <strong>MoE (Mixture of Experts)</strong>: model composition with several expert subnetworks and a gating network that routes each input to a subset of experts (top-k). MoE increases capacity while keeping per-step compute low when k ≪ #experts.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Key refs: Shazeer et al., 2017; recent efficient MoE routing practices (top-k, load balancing). Example: 16 experts with top-2 routing yields 2× compute per-sample but 16× representational capacity.</div>
    `,
    'Drift': `
        <strong>Drift</strong>: change in data distribution over time. Two common types: feature drift (P(x) shifts) and concept drift (P(y|x) changes). Detect using Page-Hinkley (loss stream) and Kolmogorov-Smirnov (feature windows). On detection, trigger replay, adapter creation, or selective fine-tuning.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Practical: maintain warmup windows and combine detectors (loss + feature) to reduce false positives. See: Page & Hinkley, sequential change detection; Bifet et al., drift survey.</div>
    `,
    'Replay': `
        <strong>Replay Buffer</strong>: bounded memory storing past examples for rehearsal. Sampling strategies: uniform reservoir sampling (provable), loss-prioritized replacement, or class-balanced reservoirs to avoid class imbalance during rehearsal.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Implementation note: store embeddings + metadata, not always full images, to reduce memory on edge devices.</div>
    `,
    'GEM': `
        <strong>GEM / A-GEM</strong>: (A-)Gradient Episodic Memory constrains gradient updates so they do not increase loss on a small memory of past examples. A-GEM is an efficient approximation using average gradients to compute a projection direction.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Key refs: Lopez-Paz & Ranzato, 2017 (GEM). Use A-GEM for lightweight edge-friendly projection operations.</div>
    `,
    'BWT': `
        <strong>Backward Transfer (BWT)</strong>: metric measuring how learning new tasks affects performance on earlier tasks. Negative BWT indicates forgetting; positive BWT indicates beneficial transfer (improvement on old tasks after new learning).
    `,
    'KS Test': `
        <strong>KS Test (Kolmogorov-Smirnov)</strong>: a two-sample non-parametric test comparing feature distributions to detect feature drift. Useful for high-level checks when features are continuous.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Practical: compare current feature window to reference window; flag if p &lt; 0.05. See: Massey, 1951.</div>
    `,
    'Page-Hinkley': `
        <strong>Page-Hinkley Test</strong>: sequential change detection on a scalar stream (e.g., loss). Tracks cumulative deviations from running mean and signals when a threshold is exceeded.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Useful for quick loss-based drift signals; tune warmup and threshold to control sensitivity.</div>
    `,
    'MC Dropout': `
        <strong>MC Dropout</strong>: use dropout at inference T times to approximate Bayesian model uncertainty; aggregate predictive entropy across samples to estimate uncertainty.
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Practical: T=10–30 stochastic forward passes; compute predictive entropy for abstention thresholds.</div>
    `,
    'Temperature Scaling': `
        <strong>Temperature Scaling</strong>: post-hoc calibration method that rescales logits by temperature T to improve softmax calibration (ECE reduction).
        <div style="margin-top:6px;font-size:12px;color:#6b7280">Simple to implement: optimize T on a validation set to minimize NLL.</div>
    `,
    'ECE': `
        <strong>Expected Calibration Error (ECE)</strong>: measures calibration by binning predicted probabilities and comparing accuracy vs confidence in each bin.
    `,
    'Entropy': `
        <strong>Entropy</strong>: predictive entropy H[y|x] = -Σ p(y|x) log p(y|x). Used as an uncertainty signal for selective prediction or abstention.
    `,
    'KD': `
        <strong>Knowledge Distillation (KD)</strong>: train a student model to match a teacher's softened outputs using KL divergence with temperature scaling; useful for transferring knowledge across tasks or compressing models.
    `,
    'Quantization': `
        <strong>Quantization</strong>: reduce model numeric precision (e.g., INT8) to shrink size and speed up inference; can be dynamic or static (with calibration).
    `,
    'TorchScript': `
        <strong>TorchScript</strong>: PyTorch serialization format (script/trace) that enables running models without the Python interpreter, easing edge deployment.
    `,
    'ONNX': `
        <strong>ONNX</strong>: open model format for interoperability between frameworks; export PyTorch to ONNX for cross-platform runtimes.
    `,
    'TensorRT': `
        <strong>TensorRT</strong>: NVIDIA runtime for highly-optimized inference, especially on GPUs — supports kernel fusion and mixed precision.
    `,
    'Raspberry Pi': `
        <strong>Raspberry Pi</strong>: ARM-based single-board computer targeted for edge deployments; may require CPU-optimized runtime and model quantization for acceptable latency.
    `,
    'FastAPI': `
        <strong>FastAPI</strong>: modern Python web framework for building fast API endpoints (async support), suitable for lightweight model inference services.
    `,
    'Edge Deployment': `
        <strong>Edge Deployment</strong>: set of practical steps (quantize, export, runtime) to run ML models on edge devices with latency/size constraints.
    `,
    'PyTorch': `
        <strong>PyTorch</strong>: deep learning library used across the project; supports eager mode, TorchScript, and export to ONNX.
    `,
    'Online EWC': `
        <strong>Online EWC</strong>: EWC variant that updates Fisher estimates incrementally (e.g., via EMA) for streaming/online settings.
    `,
    'A-GEM': `
        <strong>A-GEM</strong>: a computationally cheaper approximation of GEM that uses average gradients from episodic memories to constrain updates.
    `,
    'Dual Model': `
        <strong>Dual Model Manager</strong>: pattern that keeps a stable model and a plastic model; promotes the plastic model to stable after validation to control BWT and forgetting.
    `,
    'Replay Buffer': `
        <strong>Replay Buffer</strong>: (alias) bounded memory storing past examples for rehearsal; prefer reservoir sampling for unbiased retention.
    `
};

class MixtureOfExperts(nn.Module):
    def __init__(self, config: MoEConfig):
        super().__init__()
        self.backbone = ResNetBackbone(config)
        self.gating = GatingNetwork(
            config.feature_dim, config.num_experts
        )
        self.experts = nn.ModuleList([
            Expert(config) for _ in range(config.num_experts)
        ])
        self.lora_layers = nn.ModuleDict()

    def forward(self, x, task_id=None):
        features = self.backbone(x)
        gate_weights = self.gating(features)
        expert_outputs = torch.stack(
            [e(features) for e in self.experts], dim=-1
        )
        # Weighted mixture via einsum
        mixed = torch.einsum(
            'be,edo->bdo', gate_weights, expert_outputs
        )
        return mixed, gate_weights`,

class DriftMonitor:
    def __init__(self, ph_threshold=5.0, ks_alpha=0.05):
        self.ph_detector = PageHinkleyDetector(
            min_instances=30, delta=0.005,
            threshold=ph_threshold
        )
        self.ks_detector = KSFeatureDriftDetector(
            alpha=ks_alpha, window_size=500
        )
        self.drift_events = []

    def update(self, loss, features, task_id):
        loss_drift = self.ph_detector.update(loss)
        feat_drift = self.ks_detector.update(features)
        is_drift = loss_drift or feat_drift
        if is_drift:
            self.drift_events.append({
                'task': task_id,
                'loss_drift': loss_drift,
                'feat_drift': feat_drift
            })
        return is_drift`,

class ModelQuantizer:
    def quantize_dynamic(self, model):
        return torch.quantization.quantize_dynamic(
            model, {nn.Linear, nn.Conv2d},
            dtype=torch.qint8
        )

    def export_torchscript(self, model, sample_input):
        scripted = torch.jit.trace(model, sample_input)
        return scripted

    def benchmark(self, model, sample_input, n=100):
        times = []
        with torch.no_grad():
            for _ in range(n):
                start = time.perf_counter()
                model(sample_input)
                times.append(time.perf_counter() - start)
        return {
            'mean_ms': np.mean(times) * 1000,
            'p95_ms': np.percentile(times, 95) * 1000
        }`,

class WiFiOptimizer:
    def __init__(self, forecaster, policy, guardrails):
        self.forecaster = forecaster
        self.policy = policy
        self.guardrails = guardrails

    def build_state(self, telemetry):
        return {
            'users': telemetry['users'],
            'rssi': telemetry['rssi'],
            'noise': telemetry['noise'],
            'latency': telemetry['latency'],
            'throughput': telemetry['throughput']
        }

    def optimize(self, telemetry_window):
        state = self.build_state(telemetry_window[-1])
        predicted_load = self.forecaster.predict(telemetry_window)
        action = self.policy.select_action(state, predicted_load)
        safe_action = self.guardrails.validate(action, state)
        return safe_action`,

function highlightLine(text,isDark){
    let line=esc(text);
    const trimmed=text.trim();
    if(trimmed.startsWith('#')||trimmed.startsWith('//')){return `<span style="color:${isDark?'#9ca3af':'#6b7280'};font-style:italic">${line}</span>`}
    const tokens={};let tc=0;
    const pushTok=v=>{const k=`__TK${tc++}__`;tokens[k]=v;return k};
    line=line.replace(/(&quot;[^&]*?&quot;|&#039;[^&]*?&#039;)/g,m=>pushTok(`<span style="color:${isDark?'#4ade80':'#16a34a'}">${m}</span>`));
    line=line.replace(/(\/\/.*)$/,m=>pushTok(`<span style="color:${isDark?'#9ca3af':'#6b7280'};font-style:italic">${m}</span>`));
    Object.keys(TOOLTIPS).forEach(term=>{const re=new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'g');line=line.replace(re,m=>pushTok(`<span class="tip-trigger" style="color:${isDark?'#fbbf24':'#b45309'}">${m}<span class="tip-box">${TOOLTIPS[term]}</span></span>`))});
    const parts=line.split(/(<[^>]*>)/);
    for(let i=0;i<parts.length;i++){if(i%2===0){KEYWORDS.forEach(kw=>{parts[i]=parts[i].replace(new RegExp(`\\b(${kw})\\b`,'g'),`<span style="color:${isDark?'#c084fc':'#7c3aed'};font-weight:700">$1</span>`)})}}
    line=parts.join('');
    let prev;while(line!==prev){prev=line;Object.keys(tokens).forEach(k=>{line=line.replace(k,tokens[k])})}
    return line;
}

function renderCodeHTML(code,walk,projId){
    if(!code)return '';
    const isDark=state.dark;
    const mode=state.codeMode[projId]||'raw';
    const step=state.codeStep[projId]||0;
    const lines=code.split('\n');
    const lineNums=lines.map((_,i)=>`<div class="min-h-[1.5em] text-right pr-3 select-none" style="color:${isDark?'#4b5563':'#9ca3af'}">${i+1}</div>`).join('');
    const codeLines=lines.map((line,idx)=>{
        let opacity='1';
        if(mode==='walkthrough'&&walk){const active=walk[step].lines;opacity=(active[0]<=idx&&idx<=active[1])?'1':'0.2'}
        return `<div class="code-line min-h-[1.5em] px-2 -mx-2" style="opacity:${opacity};transition:opacity .3s ease">${highlightLine(line,isDark)||'&nbsp;'}</div>`
    }).join('');
    const isWalk=mode==='walkthrough'&&walk;
    const noteHTML=isWalk?`<div class="p-4 flex flex-col justify-between h-full"><div><div class="text-xs font-bold uppercase tracking-wider mb-2" style="color:${isDark?'#9ca3af':'#6b7280'}">Execution Step ${step+1}/${walk.length}</div><p class="text-sm leading-relaxed" style="color:${isDark?'#d1d5db':'#374151'}">${walk[step].note}</p></div><div class="flex justify-between items-center mt-4"><button onclick="codeStepPrev('${projId}')" class="p-1.5 border transition-colors ${step===0?'opacity-30 cursor-not-allowed':''}" style="border-color:${isDark?'#374151':'#000'}" onmouseenter="this.style.background='${isDark?'#1f2937':'#e5e7eb'}'" onmouseleave="this.style.background='transparent'">${icon('chevLeft',16)}</button><button onclick="codeStepNext('${projId}')" class="p-1.5 border transition-colors ${step===walk.length-1?'opacity-30 cursor-not-allowed':''}" style="border-color:${isDark?'#374151':'#000'}" onmouseenter="this.style.background='${isDark?'#1f2937':'#e5e7eb'}'" onmouseleave="this.style.background='transparent'">${icon('chevRight',16)}</button></div></div>`:'';
    return `<div class="border shadow-inner" style="border-color:${isDark?'#374151':'#000'};background:${isDark?'#050508':'#f8fafc'}"><div class="flex justify-between items-center px-4 py-2 border-b" style="border-color:${isDark?'#374151':'#000'};background:${isDark?'#12121a':'#e5e7eb'}"><div class="flex gap-2"><button onclick="setCodeMode('${projId}','raw')" class="text-xs font-bold px-3 py-1 border transition-all" style="border-color:${mode==='raw'?(isDark?'#4b5563':'#000'):'transparent'};background:${mode==='raw'?(isDark?'#1f2937':'#fff'):'transparent'};color:${mode==='raw'?(isDark?'#fff':'#000'):(isDark?'#6b7280':'#9ca3af')}">Raw Source</button><button onclick="setCodeMode('${projId}','walkthrough')" class="text-xs font-bold px-3 py-1 flex items-center gap-1 border transition-all" style="border-color:${mode==='walkthrough'?(isDark?'#4b5563':'#000'):'transparent'};background:${mode==='walkthrough'?(isDark?'#1f2937':'#fff'):'transparent'};color:${mode==='walkthrough'?(isDark?'#fff':'#000'):(isDark?'#6b7280':'#9ca3af')}">${icon('play',14)} Walkthrough</button></div></div><div class="flex code-split" style="flex-direction:row"><div class="flex-1 p-4 overflow-x-auto"><div class="flex gap-0"><div class="font-mono text-xs leading-relaxed select-none border-r pr-0 mr-3" style="border-color:${isDark?'#1f2937':'#d1d5db'}">${lineNums}</div><code class="block text-xs font-mono leading-relaxed whitespace-pre-wrap" style="color:${isDark?'#e5e7eb':'#1f2937'};word-break:break-word">${codeLines}</code></div></div>${isWalk?`<div class="code-annotation w-full md:w-64 border-l" style="border-color:${isDark?'#374151':'#000'};background:${isDark?'#0f0f14':'#f1f5f9'}">${noteHTML}</div>`:''}</div></div>`;
}

            Continual learning is a way of teaching a model new things without forcing it to forget what it already knows. In practice, that means the system keeps improving over time, reacts to new data, and stays useful when the environment changes. The project below uses that idea to keep a small edge model adaptable, efficient, and safe enough to keep running in the real world.
        </div>
    `;
    const useCases = `
        <div style="padding:12px 14px;border:1px solid rgba(0,0,0,0.08);border-radius:8px;background:#fff;font-size:13px;line-height:1.6;color:#374151">
            <div style="font-weight:700;color:#b45309;margin-bottom:6px">Use cases</div>
            <div style="display:grid;gap:10px">
                <div><strong>Project use case:</strong> keep a running edge system useful when new information appears, so it can adapt without being rebuilt from scratch.</div>
                <div><strong>Model use case:</strong> stay useful over time in changing environments, where the model must remember earlier knowledge while learning new patterns.</div>
                <div><strong>Practical outcome:</strong> reduce retraining effort, keep the system responsive, and make updates easier to manage on limited hardware.</div>
            </div>
        </div>
    `;
    let defs = '<div class="space-y-3" style="color:var(--fg,#111)">';
    Object.keys(DEFINITIONS).forEach(k=>{defs += `<div style="border-bottom:1px solid rgba(0,0,0,0.06);padding:8px 0"><div style="font-weight:700;color:#b45309;margin-bottom:6px">${k}</div><div style="font-size:13px;color:#374151">${DEFINITIONS[k]}</div></div>`});
    defs += '</div>';

    // Improved code walkthrough summary (concise)
    const walk = `
        <div style="margin-top:12px">
            <h4 style="color:#b45309;margin-bottom:6px;font-weight:700">Improved Code Walkthrough — Edge CL</h4>
            <ol style="color:#374151;font-size:13px;line-height:1.5;padding-left:18px">
                <li><strong>Backbone & Experts</strong>: single shared backbone extracts features; experts are lightweight heads (optionally LoRA-adapted) to specialize per-subtask.</li>
                <li><strong>Gating</strong>: gating network computes selection weights; use top-k routing in inference to limit compute and improve specialization.</li>
                <li><strong>Adapters</strong>: LoRA/PEFT adapters are saved/loaded per-task; base model stays frozen to avoid catastrophic forgetting.</li>
                <li><strong>Drift Detection</strong>: monitor loss with Page-Hinkley and features with KS; on drift, trigger replay or adapter creation and selective fine-tuning.</li>
                <li><strong>Regularization</strong>: EWC penalty applied with adaptive lambda and masked Fisher to protect critical params during updates.</li>
                <li><strong>Replay</strong>: reservoir sampling keeps a bounded, class-balanced set; prefer loss-prioritized replacement for high-impact rehearsal.</li>
            </ol>

    const content = `<div style="display:flex;flex-direction:column;gap:12px">${intro}${useCases}${defs}${walk}</div>`;

}

// Show a focused modal for a single term with short walkthrough steps and citations
function showTermModal(term){
    const def = DEFINITIONS[term] || ('<strong>'+term+'</strong>: definition not available.');
    const walk = TERM_WALKS[term] || [];
    let stepsHTML = '';
    if(walk.length){
        stepsHTML += `<div style="margin-top:10px"><div style="font-weight:700;color:#b45309;margin-bottom:6px">Walkthrough</div>`;
        walk.forEach((s,i)=>{ stepsHTML += `<div style="padding:8px 0;border-top:1px solid rgba(0,0,0,0.04)"><div style="font-weight:700;font-size:13px">${i+1}. ${esc(s.step)}</div><div style="font-size:13px;color:#374151;margin-top:4px">${esc(s.note)}</div></div>` });
        stepsHTML += `</div>`;
    }

    const openAllWalkBtn = `<div style="margin-top:12px;display:flex;gap:8px"><button onclick="openCodeWalkForTerm('${term}');return false;" class="px-3 py-2 text-xs font-bold" style="border:1px solid #d1d5db;background:#fff;color:#b45309">Open code walkthroughs</button><button onclick="closeModal();return false;" class="px-3 py-2 text-xs" style="border:1px solid #d1d5db;background:transparent">Close</button></div>`;

    const content = `<div style="display:flex;flex-direction:column;gap:10px"><div style="font-size:14px;color:#374151">${def}</div>${stepsHTML}${openAllWalkBtn}</div>`;
    showModal(term + ' — Definition & Steps', content);
}

function openAllCodeWalksForTerm(term){
    // Enable walkthrough mode on all code blocks that have a walk and reset to step 0.
    Object.keys(state.codeMode).forEach(id=>{state.codeMode[id]='walkthrough';state.codeStep[id]=0});
    // Re-render the page to update code blocks
    buildPage();
}

function openCodeWalkForTerm(term){
    const t = term.toLowerCase();
    let firstFound = null;
    // set all others to raw
    Object.keys(state.codeMode).forEach(id=>{state.codeMode[id]='raw';state.codeStep[id]=0});
    for(const p of PROJECTS){
        if(p.layers){
            for(const l of p.layers){
                if(!l.walk) continue;
                for(let i=0;i<l.walk.length;i++){
                    const note = (l.walk[i].note||'').toLowerCase();
                    const searchable = (l.name+' '+(l.walk[i].note||'')+' '+(l.desc||'')).toLowerCase();
                    if(searchable.indexOf(t)!==-1 || note.indexOf(t)!==-1 || (t==='ks test'&&/\bks\b/.test(searchable)) || (t==='ks'&&/\bks\b/.test(searchable)) || (t.indexOf('page')!==-1 && /page-?hinkley/.test(searchable))){
                        const layerId = `${p.id}-${l.name.toLowerCase().replace(/[^a-z0-9]/g,'-')}`;
                        state.codeMode[layerId]='walkthrough';
                        state.codeStep[layerId]=i;
                        firstFound = layerId;
                        break;
                    }
                }
                if(firstFound) break;
            }
        }
        if(firstFound) break;
        if(p.walk){
            for(let i=0;i<p.walk.length;i++){
                const searchable = (p.title||p.id+' '+(p.walk[i].note||'')).toLowerCase();
                if(searchable.indexOf(t)!==-1){
                    state.codeMode[p.id]='walkthrough';state.codeStep[p.id]=i;firstFound=p.id;break;
                }
            }
        }
        if(firstFound) break;
    }
    if(firstFound){
        buildPage();
        setTimeout(()=>{
            const el=document.getElementById('code-block-'+firstFound);
            if(el){
                el.scrollIntoView({behavior:'smooth',block:'center'});
                const orig = el.style.boxShadow;
                el.style.boxShadow = '0 8px 30px rgba(180,83,9,0.18)';
                setTimeout(()=>{el.style.boxShadow = orig},1200);
            }
        },120);
    } else {
        // fallback: open full CL dialog when no code mapping
        buildPage();
    }
}

function setCodeMode(id,mode){
    state.codeMode[id]=mode;state.codeStep[id]=0;

    if(el){
        // 找到对应代码和walk
        let code=null,walk=null;

            if(p.id===id){code=p.code;walk=p.walk;break}
        }
        if(code)el.innerHTML=renderCodeHTML(code,walk,id);
    }
}
function codeStepNext(id){
    let walk=null;
    for(const p of PROJECTS){
        if(p.layers){for(const l of p.layers){if(`${p.id}-${l.name.toLowerCase().replace(/[^a-z0-9]/g,'-')}`===id){walk=l.walk;break}}}
        if(p.id===id){walk=p.walk;break}
    }
    if(walk)state.codeStep[id]=Math.min(walk.length-1,state.codeStep[id]+1);
    const el=document.getElementById(`code-block-${id}`);
    if(el){
        let code=null;
        for(const p of PROJECTS){
            if(p.layers){for(const l of p.layers){if(`${p.id}-${l.name.toLowerCase().replace(/[^a-z0-9]/g,'-')}`===id){code=l.code;break}}}
            if(p.id===id){code=p.code;break}
        }
        if(code)el.innerHTML=renderCodeHTML(code,walk,id);
    }
}

function setupReveal(){
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible'));return}
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:.06,rootMargin:'0px 0px -30px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

document.addEventListener('DOMContentLoaded',buildPage);
</script>
